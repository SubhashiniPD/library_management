{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Available Books</h2>
<div class="row mb-4">
    <div class="col-md-6">

        <form method="GET">

            <div class="input-group">

                <input
                    type="text"
                    name="search"
                    class="form-control"
                    placeholder="Search by Book Title or Author"
                    value="{{ request.GET.search }}">

                <button class="btn btn-primary">
                    <i class="bi bi-search"></i>
                    Search
                </button>

            </div>

        </form>

    </div>
</div>

<table class="table table-bordered table-striped">

    <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Action</th>
        </tr>
    </thead>


    <tbody>

    {% for book in books %}

        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.category }}</td>
            <td>{{ book.quantity }}</td>

            <td>
                <a href="{% url 'issue_book' book.id %}"
                   class="btn btn-success btn-sm">
                    📖 Issue Book
                </a>
            </td>

        </tr>

    {% empty %}

        <tr>
            <td colspan="5" class="text-center">
                No books available.
            </td>
        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
